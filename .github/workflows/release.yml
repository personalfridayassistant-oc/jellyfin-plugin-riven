name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p artifacts/package
          cp bin/Release/net9.0/Jellyfin.Plugin.Riven.dll artifacts/package/
          cp manifest.json artifacts/
          (cd artifacts/package && zip -r "../Jellyfin.Plugin.Riven_${VERSION}.zip" .)

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Jellyfin.Plugin.Riven_*.zip
            artifacts/manifest.json
          generate_release_notes: true
